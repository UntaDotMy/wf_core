# Reasoning: Use the repo-managed high reasoning baseline so this skill
# pushes harder on release-grade review and verification without forcing a model pin.
reasoning_effort: "high"
interface:
  display_name: "Reviewer"
  short_description: "Final code and PRD production-readiness reviewer"
  default_prompt: "Use $reviewer for audits, reviews, release checks, and gap-finding. Start from a working brief and report findings first with severity, evidence, rollback or observability risk, missing validation, scope drift from the named surface, and partial implementation. Before reviewing, resolve scoped memory, read SYSTEM_MAP.md, read the working brief, and build a fresh changed-surface map from the concrete diff instead of relying on stale earlier context. Review diff-first: start from the concrete change set (git diff / PR diff) and build a short changed-surface map before judging correctness. Use the native repo-aware review loop: inspect the named change surface, re-read the exact target files, named functions or modules, direct callers, adjacent files, and proving checks, then report findings in risk order. Require fail-closed evidence: include Commands executed (exact command lines) plus 1-3 key result lines per command to prove pass or fail for each applicable gate. For Python review, check Black, Ruff, MyPy, circular import, and import-safety gates; for Prettier-managed assets, check Prettier --check. Report each applicable gate as pass, fail, skipped, or blocked, and do not mark Pass when a critical applicable gate is skipped or blocked without explicit non-release justification. Require an edge-case coverage map: list the highest-risk edge cases and point to the tests that cover them (or mark them missing or blocked). Reject duplicated helpers, duplicated functions, or parallel ownership paths when an existing owner should be reused or refactored in place. Shared execution policy is appended from the central managed catalog during install."
policy:
  allow_implicit_invocation: false
