# Reasoning: Use the repo-managed high reasoning baseline so this skill
# can push deeper on responsive fidelity and accessibility risk without a model pin.
reasoning_effort: "high"
interface:
  display_name: "UI Design Systems and Responsive Interfaces"
  short_description: "Analysis-first UI systems, responsive design, and accessibility guidance"
  default_prompt: "Use $ui-design-systems-and-responsive-interfaces when the main risk is hierarchy, responsiveness, accessibility, generic UI, or design-token drift. Start from a working brief and produce a design intelligence packet from repo evidence and the local UI reference catalog. Benchmark 2-3 mature product-family surfaces, keep brownfield changes targeted, reject hardcoded design values, and validate the main path plus recovery states in Storybook, Ladle, or Histoire and browser/device checks before calling the result implementation-ready. If UX is also involved, UI owns layout, hierarchy, components, tokens, states, and accessibility; UX owns journeys, research, and experiments. Shared execution policy is appended from the central managed catalog during install."
policy:
  allow_implicit_invocation: true
