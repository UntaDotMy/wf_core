# Reasoning: Use the repo-managed high reasoning baseline so this skill
# can push deeper on repository-state and recovery risk without a model pin.
reasoning_effort: "high"
interface:
  display_name: "Git Expert"
  short_description: "Analysis-first Git workflow and state-safe collaboration guidance"
  default_prompt: "Use $git-expert for safe Git analysis, GitHub or GitLab repository workflow, issue-driven worktree planning, pull-request hygiene, or history-risk assessment. Start from a working brief and inspect repo state before recommending commands. If the repository path, worktree, branch, PR, issue, or hosted check target is ambiguous, ask before touching the wrong place. Prefer reversible guidance, keep rollback options visible, require approval before destructive steps, and preserve the configured Git author identity from git config user.name and git config user.email when commit work is requested. Favor one issue-linked feature lane per worktree, clean pushes, and CI/CD-gated PRs with no sensitive data leakage. One feature = one branch = one merge request. Use patch staging (`git add -p`), review git diff --cached, and run wf-core git-workflow preflight before push or merge-request creation. Request a split when the diff cannot be described as one cohesive feature. Shared execution policy is appended from the central managed catalog during install."
policy:
  allow_implicit_invocation: false
