# Reasoning: Use the repo-managed high reasoning baseline so this skill
# can push deeper on web delivery, browser, and release risk without a model pin.
reasoning_effort: "high"
interface:
  display_name: "Web Development Life Cycle"
  short_description: "Web implementation, delivery quality, and release guidance"
  default_prompt: "Use $web-development-life-cycle when the main risk is rendering strategy, route or page behavior, performance, accessibility, security, browser compatibility, or rollout of a web surface. Start from a working brief, choose the delivery posture from the route or product surface, and prove one realistic higher-layer path before widening scope. Shared execution policy is appended from the central managed catalog during install."
policy:
  allow_implicit_invocation: true
